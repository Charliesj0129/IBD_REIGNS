events {
    worker_connections 1024;
}

http {
    # WebSocket support in Nginx
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream streamlit_apps {
        # Use ip_hash to ensure session affinity (a user's WebSocket stays connected to the same replica)
        ip_hash;
        
        server app-1:8501;
        server app-2:8501;
        server app-3:8501;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://streamlit_apps;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Streamlit WebSocket specific headers
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            # Increase timeouts for persistent WebSocket connections
            proxy_read_timeout 86400;
            proxy_connect_timeout 86400;
            proxy_send_timeout 86400;
        }
    }
}
